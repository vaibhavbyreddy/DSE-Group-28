name: Overleaf Backup

on:
  schedule:
    - cron: '*/5 * * * *' # Set to your preferred safe interval
  workflow_dispatch:

# FIX 1: Explicitly grant the script permission to push files to your repository
permissions:
  contents: write 

# FIX 2: Force Node 24 to silence the deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync Multiple Overleaf Projects
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Define your Overleaf projects here
          PROJECTS=(
            "69e618b4816cad2a1aae230a project_plan"
            "69e729087b819a8573d53578 baseline_report"
            "69ee398cd816238aa2a591b0 project_plan_revised"
            "69f463e0a70e24818cb590cd midterm_report"
          )
          
          for entry in "${PROJECTS[@]}"; do
            set -- $entry
            pid=$1
            folder_name=$2
            
            echo "Processing Overleaf project: $folder_name..."

            # Use the universal 'git' username with your token
            git clone "https://git:${{ secrets.OVERLEAF_TOKEN }}@git.overleaf.com/$pid" temp_dir
            
            mkdir -p "$folder_name"
            rsync -a --delete --exclude='.git/' temp_dir/ "$folder_name/"
            rm -rf temp_dir
          done
          
          git add .
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "Automated sync of multiple Overleaf projects"
            git push origin main
          else
            echo "No new changes detected across any projects."
          fi
